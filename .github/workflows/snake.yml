name: Generate Snake Animation

on:
  # Run automatically every 12 hours
  schedule:
    - cron: "0 */12 * * *"
  # Allow manual triggering from the Actions tab
  workflow_dispatch:
  # Regenerate whenever main is pushed
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#7C3AED&color_dots=#dbeafe,#93c5fd,#3b82f6,#6366f1,#7c3aed
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#7C3AED
            dist/github-snake.gif?color_snake=#7C3AED&color_dots=#dbeafe,#93c5fd,#3b82f6,#6366f1,#7c3aed

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
