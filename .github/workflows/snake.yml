name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate branded snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#7C3AED&color_dots=#ebedf0,#dbeafe,#93c5fd,#3b82f6,#1d4ed8
            dist/github-contribution-grid-snake-dark.svg?color_snake=#2563EB&color_dots=#161b22,#1e3a5f,#1e40af,#2563eb,#7c3aed

      - name: Slow animation 3× and smooth easing
        run: |
          python3 - <<'EOF'
          import re

          for path in [
            "dist/github-contribution-grid-snake.svg",
            "dist/github-contribution-grid-snake-dark.svg",
          ]:
            try:
              txt = open(path).read()
              # Stretch every animation-duration to 3× its generated value
              txt = re.sub(
                r'animation-duration:([0-9.]+)s',
                lambda m: f'animation-duration:{float(m.group(1)) * 3:.2f}s',
                txt
              )
              # Replace choppy steps() timing with linear for a glide effect
              txt = txt.replace('animation-timing-function:steps(1)', 'animation-timing-function:linear')
              open(path, "w").write(txt)
            except Exception as e:
              print(f"skip {path}: {e}")
          EOF

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
