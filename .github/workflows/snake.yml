name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate branded snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#7C3AED&color_dots=#ebedf0,#dbeafe,#93c5fd,#3b82f6,#1d4ed8
            dist/github-contribution-grid-snake-dark.svg?color_snake=#2563EB&color_dots=#161b22,#1e3a5f,#1e40af,#2563eb,#7c3aed

      - name: Slow animation uniformly (1.5×) for a calmer glide
        run: |
          python3 - <<'EOF'
          import re

          FACTOR = 1.5  # snk default master cycle is ~70.7s; 1.5× → ~106s
          NUM = r'(\d+(?:\.\d+)?)'

          # Scale EVERY time value (ms first, then s) by FACTOR so the master
          # animation duration and all per-cell delays stay perfectly in sync.
          def scale_ms(m): return f"{float(m.group(1)) * FACTOR:.0f}ms"
          def scale_s(m):  return f"{float(m.group(1)) * FACTOR:.3f}s"

          for path in [
            "dist/github-contribution-grid-snake.svg",
            "dist/github-contribution-grid-snake-dark.svg",
          ]:
            try:
              txt = open(path).read()
              txt = re.sub(NUM + r'ms', scale_ms, txt)   # ms first
              txt = re.sub(NUM + r's\b', scale_s, txt)   # then bare s (won't touch ms)
              open(path, "w").write(txt)
              print(f"scaled {path}")
            except Exception as e:
              print(f"skip {path}: {e}")
          EOF

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
